{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm border-dark">
                <div class="card-header bg-dark text-white">Create Purchase Order</div>
                <div class="card-body">
                    <form action="{{ url_for('add_purchase_order') }}" method="POST">
                        <label class="form-label">Select Book</label>
                        <select name="book_id" class="form-select mb-3" required>
                            {% for book in books %}
                            <option value="{{ book.id }}">{{ book.title }}</option>
                            {% endfor %}
                        </select>
                        <label class="form-label">Order Quantity</label>
                        <input type="number" name="quantity" class="form-control mb-3" min="1" required>
                        <button type="submit" class="btn btn-danger w-100">Submit Order</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <h3>Recent Purchase Orders</h3>
            <table class="table table-striped shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Date</th>
                        <th>Book ID</th>
                        <th>Order Qty</th>
                    </tr>
                </thead>
                <tbody>
                    {% for order in orders %}
                    <tr>
                        <td>{{ order.date.strftime('%Y-%m-%d') }}</td>
                        <td>#{{ order.book_id }}</td>
                        <td>{{ order.quantity }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
