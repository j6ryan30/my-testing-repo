{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-danger"><i class="bi bi-exclamat-triangle"></i> Low Stock Alerts</h2>
        <span class="badge bg-dark">Threshold: {{ threshold }} units</span>
    </div>

    <table class="table table-hover shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Title</th>
                <th>ISBN</th>
                <th>Current Stock</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr class="table-warning">
                <td>{{ book.title }}</td>
                <td>{{ book.isbn }}</td>
                <td class="fw-bold text-danger">{{ book.quantity }}</td>
                <td>
                    <a href="{{ url_for('edit_book', book_id=book.id) }}" class="btn btn-sm btn-primary">Update Stock</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
