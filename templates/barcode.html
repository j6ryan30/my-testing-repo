{% extends "base.html" %}

{% block title %}Barcode - {{ book.title }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg mx-auto" style="max-width: 500px; border: 2px solid #333;">
        <div class="card-header bg-dark text-white text-center">
            <h4>Barcode Identity</h4>
        </div>

        <div class="card-body text-center p-5">
            <h5 class="text-muted mb-4">{{ book.title }}</h5>

            <div class="barcode-container mb-4">
                <img src="{{ url_for('static', filename=barcode_url) }}"
                     alt="Barcode for {{ book.isbn }}"
                     class="img-fluid border p-3 bg-white">
            </div>

            <p class="fw-bold">ISBN: {{ book.isbn }}</p>
            <hr>

            <div class="d-grid gap-2">
                <button onclick="window.print()" class="btn btn-outline-dark">Print Label</button>
                <a href="{{ url_for('inventory') }}" class="btn btn-danger">Return to Inventory</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
